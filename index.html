<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb ON OFF</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }

        #bulb {
            width: 250px;
        }

        button {
            width: 120px;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
        }

        .active {
            color: white;
        }
    </style>
</head>
<body>

    <h1>Bulb ON OFF</h1>

    <img src="off-3.png" id="bulb" alt="Bulb">

    <br><br>

    <button id="onBtn" onclick="bulbOn()">ON</button>
    <button id="offBtn" onclick="bulbOff()">OFF</button>

    <script>
        const bulb = document.getElementById("bulb");
        const onBtn = document.getElementById("onBtn");
        const offBtn = document.getElementById("offBtn");

        function bulbOn() {
            console.log("funvtion called");
            
            bulb.src = "on-3.png";

            onBtn.style.backgroundColor = "green";
            onBtn.style.color = "white";

            offBtn.style.backgroundColor = "lightgray";
            offBtn.style.color = "black";
        }

        function bulbOff() {
            bulb.src = "off-3.png";

            offBtn.style.backgroundColor = "red";
            offBtn.style.color = "white";

            onBtn.style.backgroundColor = "lightgray";
            onBtn.style.color = "black";
        }

        bulbOff();
    </script>

</body>
</html>
